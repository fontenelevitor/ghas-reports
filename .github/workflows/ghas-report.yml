
name: GHAS Daily Report

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  security-events: read
  contents: read

jobs:
  ghas-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List repositories
        run: |
          gh repo list fontenelevitor --json name --limit 1000 > repos.json

