
name: GHAS Daily Report

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  security-events: read
  contents: read

jobs:
  ghas-report:
    runs-on: ubuntu-latest
  
    env:
      GH_TOKEN: ${{ secrets.GHAS_READ_TOKEN }}


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List repositories
        run: |
          gh repo list fontenelevitor --json name --limit 1000 > repos.json

      - name: Secret Scanning report
        run: |
          echo "Repositorio,TotalVulnerabilidades,StatusGHAS" > secret_scanning.csv

          jq -r '.[].name' repos.json | while read repo; do
            alerts=$(gh api repos/fontenelevitor/$repo/secret-scanning/alerts --paginate 2>/dev/null || true)

            if [ "$alerts" = "" ]; then
              echo "$repo,0,Nao configurado" >> secret_scanning.csv
            else
              total=$(echo "$alerts" | jq 'length')
              echo "$repo,$total,OK" >> secret_scanning.csv
            fi
          done


      - name: Code Scanning report
        run: |
          echo "Repositorio,Criticas,Altas,TotalVulnerabilidades,StatusGHAS" > code_scanning.csv

          jq -r '.[].name' repos.json | while read repo; do
            response=$(gh api repos/fontenelevitor/$repo/code-scanning/alerts --paginate 2>/dev/null || true)

            # Verifica se a resposta é um array
            is_array=$(echo "$response" | jq 'type == "array"' 2>/dev/null || echo "false")

            if [ "$is_array" != "true" ]; then
              echo "$repo,0,0,0,Nao configurado" >> code_scanning.csv
            else
              crit=$(echo "$response" | jq '[.[] | select(.rule.severity=="critical")] | length')
              high=$(echo "$response" | jq '[.[] | select(.rule.severity=="high")] | length')
              total=$((crit + high))
              echo "$repo,$crit,$high,$total,OK" >> code_scanning.csv
            fi
          done

      - name: Dependabot report
        run: |
          echo "Repositorio,Criticas,Altas,TotalVulnerabilidades,StatusGHAS" > dependabot.csv

          jq -r '.[].name' repos.json | while read repo; do
            response=$(gh api repos/fontenelevitor/$repo/dependabot/alerts --paginate 2>/dev/null || true)

            is_array=$(echo "$response" | jq 'type == "array"' 2>/dev/null || echo "false")

            if [ "$is_array" != "true" ]; then
              echo "$repo,0,0,0,Nao configurado" >> dependabot.csv
            else
              crit=$(echo "$response" | jq '[.[] | select(.severity=="critical")] | length')
              high=$(echo "$response" | jq '[.[] | select(.severity=="high")] | length')
              total=$((crit + high))
              echo "$repo,$crit,$high,$total,OK" >> dependabot.csv
            fi
          done

          
          
      - name: Upload GHAS reports
        uses: actions/upload-artifact@v4
        with:
          name: ghas-reports
          path: "*.csv"

